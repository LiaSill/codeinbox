<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="css/style.css">
  <title>Код В Квадрате</title>
</head>

<body>
  <div class="preloader" id="preloader">
    <img class="preloader__gif" src="assets/cat_loader.gif" alt="Загрузка">
  </div>
  <script>
    window.addEventListener("load", function () {
      const preloader = document.getElementById("preloader");
      setTimeout(() => {
        preloader.classList.add("hide");
        setTimeout(() => {
          preloader.style.display = "none";
        }, 1000)
      }, 2000);
    })
  </script>
  <header class="header">
    <div class="container">
      <div class="header__wrapper">
        <a class="header__main-link" href="index.html" aria-label="Ссылка на главную страницу">
          <svg class="header__icon-paw-main" width="68" height="60" aria-hidden="true">
            <use xlink:href="images/sprite.svg#icon-paw-main"></use>
          </svg>
        </a>
      </div>
    </div>
  </header>
  <main>
    <section class="main-page">
      <div class="container">
        <h1 class="visually-hidden">Код в Квадрате</h1>
        <div class="main-page__wrapper">
          <svg class="main-page__icon-pawprint" width="273" height="412" aria-hidden="true">
            <use xlink:href="images/sprite.svg#icon-pawprint"></use>
          </svg>
          <div class="main-page__game-preshow">

          </div>
          <ul class="main-page__codebox-list">
            <li class="main-page__codebox-item">
              <div class="main-page__box main-page__box--secret">
                <svg class="main-page__icon-question-mark" width="40" height="65" aria-hidden="true">
                  <use xlink:href="images/sprite.svg#icon-question-mark"></use>
                </svg>
              </div>
            </li>
            <li class="main-page__codebox-item">
              <div class="main-page__box">
                <svg class="main-page__icon-lock" width="66" height="78" aria-hidden="true">
                  <use xlink:href="images/sprite.svg#icon-lock"></use>
                </svg>
              </div>
            </li>
            <li class="main-page__codebox-item">
              <div class="main-page__box">
                <svg class="main-page__icon-lock" width="66" height="78" aria-hidden="true">
                  <use xlink:href="images/sprite.svg#icon-lock"></use>
                </svg>
              </div>
            </li>
            <li class="main-page__codebox-item">
              <div class="main-page__box">
                <svg class="main-page__icon-lock" width="66" height="78" aria-hidden="true">
                  <use xlink:href="images/sprite.svg#icon-lock"></use>
                </svg>
              </div>
            </li>
          </ul>
          <svg class="main-page__icon-sun" width="275" height="275" aria-hidden="true">
            <use xlink:href="images/sprite.svg#icon-sun"></use>
          </svg>
          <svg class="main-page__icon-cat-smiling" width="187" height="187" aria-hidden="true">
            <use xlink:href="images/sprite.svg#icon-cat-smiling"></use>
          </svg>
        </div>
      </div>
    </section>
  </main>
  <div class="dialog-overlay" id="dialog">
    <div class="dialoge-box">
      
    </div>
  </div>
  <footer class="footer">
    <div class="container">
    </div>
  </footer>
</body>

</html>
